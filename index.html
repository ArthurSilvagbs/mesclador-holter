<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gerador de Laudo de Holter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
  /* ============================================================
     Tokens — modo escuro é o padrão; claro via [data-theme="light"]
     · 1 cor primária (índigo) + neutros · cor só com significado
     · grid 4/8px · microinterações 180ms
     ============================================================ */
  :root {
    color-scheme: dark;

    --ink-900: #f4f4f5;
    --ink-700: #d4d4d8;
    --ink-500: #a1a1aa;
    --ink-400: #70707a;
    --line: #26262b;
    --line-strong: #3a3a42;
    --bg-app: #101013;
    --bg-card: #17171b;
    --bg-soft: #222227;

    --primary: #6366f1;
    --primary-strong: #818cf8;
    --primary-soft: rgba(99, 102, 241, 0.16);

    --danger: #f87171;

    --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
    --page-shadow: 0 1px 2px rgba(0,0,0,0.4), 0 16px 40px -12px rgba(0,0,0,0.6);

    --s1: 4px; --s2: 8px; --s3: 12px; --s4: 16px; --s5: 24px; --s6: 32px;

    --t-kicker: 11px;
    --t-caption: 12px;
    --t-meta: 13px;
    --t-body: 14px;
    --t-md: 15px;

    --radius: 12px;
    --radius-sm: 7px;
    --speed: 180ms;
  }
  :root[data-theme="light"] {
    color-scheme: light;

    --ink-900: #18181b;
    --ink-700: #3f3f46;
    --ink-500: #71717a;
    --ink-400: #a1a1aa;
    --line: #e4e4e7;
    --line-strong: #d4d4d8;
    --bg-app: #f4f4f5;
    --bg-card: #ffffff;
    --bg-soft: #f4f4f5;

    --primary: #4f46e5;
    --primary-strong: #4338ca;
    --primary-soft: #eef2ff;

    --danger: #b91c1c;

    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --page-shadow: 0 1px 2px rgba(0,0,0,0.05), 0 16px 40px -12px rgba(0,0,0,0.22);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: Inter, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-app);
    color: var(--ink-900);
    font-size: var(--t-body);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    transition: background var(--speed), color var(--speed);
  }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--s3);
    padding: var(--s3) var(--s5);
    background: var(--bg-card);
    border-bottom: 1px solid var(--line);
    transition: background var(--speed), border-color var(--speed);
  }
  .toolbar h1 { font-size: var(--t-md); font-weight: 800; letter-spacing: 0.02em; margin: 0; }
  .toolbar .actions { display: flex; gap: var(--s2); }

  button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: var(--s2);
    font: inherit;
    font-size: var(--t-body);
    font-weight: 600;
    padding: var(--s2) var(--s4);
    border: 1px solid var(--line-strong);
    border-radius: var(--radius-sm);
    background: var(--bg-card);
    color: var(--ink-700);
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: background var(--speed), border-color var(--speed), color var(--speed);
  }
  button:hover { background: var(--bg-soft); color: var(--ink-900); }
  button:active { transform: translateY(0.5px); }
  button:disabled { opacity: 0.6; cursor: default; }
  button.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
  button.primary:hover { background: var(--primary-strong); border-color: var(--primary-strong); }
  button.ghost { border-color: transparent; background: transparent; color: var(--ink-500); box-shadow: none; }
  button.ghost:hover { background: var(--bg-soft); color: var(--ink-700); }

  main { flex: 1; display: flex; min-height: 0; }

  #form-pane {
    width: 400px;
    min-width: 340px;
    overflow-y: auto;
    background: var(--bg-card);
    border-right: 1px solid var(--line);
    padding: var(--s5) var(--s4);
    transition: background var(--speed), border-color var(--speed);
  }
  fieldset {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    margin: 0 0 var(--s4);
    padding: var(--s3) var(--s4) var(--s4);
  }
  legend {
    font-size: var(--t-caption);
    font-weight: 600;
    color: var(--ink-500);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 0 var(--s2);
  }
  label {
    display: block;
    font-size: var(--t-kicker);
    font-weight: 600;
    color: var(--ink-500);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: var(--s3) 0 var(--s1);
  }
  label.req::after { content: " *"; color: var(--danger); }
  input, select, textarea {
    width: 100%;
    font: inherit;
    font-size: var(--t-body);
    padding: var(--s2) var(--s3);
    border: 1px solid var(--line-strong);
    border-radius: var(--radius-sm);
    background: var(--bg-app);
    color: var(--ink-900);
    transition: border-color var(--speed), box-shadow var(--speed), background var(--speed);
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--primary);
    outline: none;
    box-shadow: 0 0 0 3px var(--primary-soft);
  }
  input.invalid, select.invalid { border-color: var(--danger); }
  input[type="file"]::file-selector-button {
    font: inherit;
    font-size: var(--t-meta);
    font-weight: 600;
    margin-right: var(--s3);
    padding: var(--s1) var(--s3);
    border: 1px solid var(--line-strong);
    border-radius: var(--radius-sm);
    background: var(--bg-soft);
    color: var(--ink-700);
    cursor: pointer;
    transition: background var(--speed);
  }
  textarea { resize: vertical; min-height: 110px; }
  textarea.small { min-height: 60px; }
  .row { display: flex; gap: var(--s2); }
  .row > div { flex: 1; min-width: 0; }
  .hint { font-size: var(--t-caption); color: var(--ink-400); margin-top: var(--s1); line-height: 1.45; }

  :focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }

  #preview-pane { flex: 1; overflow: auto; padding: var(--s6); }
  .attach-note {
    background: var(--bg-card);
    border: 1px dashed var(--line-strong);
    border-radius: var(--radius);
    padding: var(--s3) var(--s4);
    font-size: var(--t-meta);
    color: var(--ink-500);
  }
  .attach-note b { color: var(--ink-700); font-weight: 600; }
  #pages-wrapper { margin: 0 auto; }
  #pages { width: 210mm; }

  /* ---------- Documento (A4) ----------
     Não herda o tema: é o PDF da clínica, sempre preto no branco. */
  .page {
    width: 210mm;
    height: 297mm;
    background: #fff;
    color: #000;
    font-family: Arial, Helvetica, sans-serif;
    box-shadow: var(--page-shadow);
    margin: 0 0 var(--s4);
    padding: 14mm 20mm 10mm;
    display: flex;
    flex-direction: column;
    font-size: 10.5px;
    line-height: 1.5;
  }
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 1.5px solid #000;
    padding-bottom: 3mm;
  }
  .logo-box img { max-height: 16mm; max-width: 50mm; display: block; }
  .logo-placeholder {
    width: 34mm;
    height: 14mm;
    border: 1px dashed #999;
    color: #999;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    letter-spacing: 2px;
  }
  .clinic { text-align: right; }
  .clinic .name { font-weight: bold; font-size: 16px; line-height: 1.25; }
  .clinic .unit { font-size: 10px; }
  .clinic .exam { font-weight: bold; font-size: 11.5px; margin-top: 1mm; }

  .page-content { flex: 1; min-height: 0; overflow: hidden; padding-top: 4mm; }

  .page-footer {
    border-top: 1px solid #000;
    padding-top: 2mm;
    margin-top: 2mm;
    display: flex;
    justify-content: space-between;
    font-size: 8.5px;
    color: #222;
  }

  table.pgrid {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    margin: 0 0 5mm;
  }
  .pgrid td {
    border: 1px solid #555;
    padding: 1.6mm 2mm;
    font-size: 9.8px;
    overflow: hidden;
  }
  .lbl { font-weight: bold; }

  .laudo-title { font-weight: bold; font-size: 11.5px; margin: 2mm 0 2.5mm; }
  .laudo-p { margin: 0 0 2.2mm; text-align: justify; }
  .conclusao { margin-top: 4mm; }

  .sig-block { margin-top: 16mm; }
  .sig-block .sig-line { width: 70mm; border-top: 1px solid #000; margin-bottom: 1.5mm; }
  .sig-block .doc-name { font-weight: bold; }

  /* ---------- Impressão (fallback Ctrl+P) ---------- */
  @page { size: A4; margin: 0; }
  @media print {
    .toolbar, #form-pane, .attach-note { display: none !important; }
    main, #preview-pane { display: block; overflow: visible; padding: 0; }
    #pages-wrapper { width: auto !important; height: auto !important; }
    #pages { transform: none !important; }
    .page {
      height: 296.5mm;
      box-shadow: none;
      margin: 0;
      break-after: page;
    }
    .page:last-child { break-after: auto; }
  }
</style>
</head>
<body>

<header class="toolbar">
  <h1>Gerador de Laudo de Holter</h1>
  <div class="actions">
    <button type="button" id="btn-tema" class="ghost" title="Alternar tema claro/escuro">◐</button>
    <button type="button" id="btn-exemplo">Preencher exemplo</button>
    <button type="button" id="btn-preview">Gerar preview</button>
    <button type="button" id="btn-pdf" class="primary">Exportar PDF</button>
  </div>
</header>

<main>
  <section id="form-pane">
    <form id="report-form" autocomplete="off">

      <fieldset>
        <legend>Clínica</legend>
        <label for="c_nome">Nome da clínica</label>
        <input id="c_nome" type="text" value="Clínica Cardiológica Exemplo" />
        <div class="row">
          <div>
            <label for="c_unidade">Unidade</label>
            <input id="c_unidade" type="text" value="Unidade Centro" />
          </div>
          <div>
            <label for="c_tipo">Tipo de exame</label>
            <input id="c_tipo" type="text" value="Holter" />
          </div>
        </div>
        <label for="logo_file">Logo (opcional)</label>
        <input id="logo_file" type="file" accept="image/*" />
      </fieldset>

      <fieldset>
        <legend>Paciente</legend>
        <label class="req" for="p_nome">Nome completo</label>
        <input id="p_nome" type="text" />
        <div class="row">
          <div>
            <label class="req" for="p_nascimento">Data de nascimento</label>
            <input id="p_nascimento" type="date" />
            <div class="hint">A idade é calculada automaticamente.</div>
          </div>
          <div>
            <label class="req" for="p_sexo">Sexo</label>
            <select id="p_sexo">
              <option value=""></option>
              <option>Feminino</option>
              <option>Masculino</option>
              <option>Outro</option>
            </select>
          </div>
        </div>
        <label class="req" for="p_data_exame">Data e hora do exame</label>
        <input id="p_data_exame" type="datetime-local" />
        <div class="row">
          <div>
            <label for="p_peso">Peso (kg)</label>
            <input id="p_peso" type="number" step="any" min="0" />
          </div>
          <div>
            <label for="p_altura">Altura (cm)</label>
            <input id="p_altura" type="number" step="any" min="0" />
          </div>
        </div>
        <label for="p_medico">Médico solicitante</label>
        <input id="p_medico" type="text" />
      </fieldset>

      <fieldset>
        <legend>Laudo</legend>
        <label for="l_paragrafos">Parágrafos do laudo</label>
        <textarea id="l_paragrafos"></textarea>
        <div class="hint">Uma linha por achado.</div>
        <label for="l_conclusao">Conclusão</label>
        <textarea id="l_conclusao" class="small"></textarea>
      </fieldset>

      <fieldset>
        <legend>PDF do exame</legend>
        <label for="exam_pdf">Anexar PDF do exame (relatório do aparelho)</label>
        <input id="exam_pdf" type="file" accept="application/pdf" />
        <div class="hint">As páginas do PDF anexado entram no documento final, logo após a capa do laudo.</div>
      </fieldset>

      <fieldset>
        <legend>Assinatura / Validação</legend>
        <label for="a_medico">Nome do médico</label>
        <input id="a_medico" type="text" />
        <div class="row">
          <div>
            <label for="a_especialidade">Especialidade</label>
            <input id="a_especialidade" type="text" />
          </div>
          <div>
            <label for="a_crm">CRM</label>
            <input id="a_crm" type="text" />
          </div>
          <div>
            <label for="a_rqe">RQE</label>
            <input id="a_rqe" type="text" />
          </div>
        </div>
      </fieldset>

    </form>
  </section>

  <section id="preview-pane">
    <div id="pages-wrapper">
      <div id="pages"></div>
    </div>
  </section>
</main>

<script>
  const $ = (id) => document.getElementById(id);
  let logoDataUrl = null;
  let examPdf = null; // { bytes, pageCount, fileName }

  if (localStorage.getItem('laudo_theme') === 'light') {
    document.documentElement.dataset.theme = 'light';
  }
  $('btn-tema').addEventListener('click', () => {
    const next = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
    document.documentElement.dataset.theme = next;
    localStorage.setItem('laudo_theme', next);
  });

  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
  ));
  const dash = (v) => (v && String(v).trim()) ? esc(String(v).trim()) : '-';

  function fmtDate(iso) {
    if (!iso) return '';
    const [y, m, d] = iso.split('-');
    return `${d}/${m}/${y}`;
  }
  function fmtExam(dt) {
    if (!dt) return '';
    const [date, time] = dt.split('T');
    return `${fmtDate(date)} às ${time.slice(0, 5)}`;
  }
  function calcAge(birthIso, refIso) {
    if (!birthIso) return '';
    const b = new Date(birthIso + 'T00:00:00');
    const ref = refIso ? new Date(refIso) : new Date();
    if (isNaN(b) || isNaN(ref)) return '';
    let a = ref.getFullYear() - b.getFullYear();
    const m = ref.getMonth() - b.getMonth();
    if (m < 0 || (m === 0 && ref.getDate() < b.getDate())) a--;
    return a >= 0 ? `${a} anos` : '';
  }

  function collectData() {
    const nasc = $('p_nascimento').value;
    const exame = $('p_data_exame').value;
    return {
      clinica: {
        nome: $('c_nome').value.trim(),
        unidade: $('c_unidade').value.trim(),
        tipo_exame: $('c_tipo').value.trim() || 'Holter'
      },
      paciente: {
        nome: $('p_nome').value.trim(),
        nascimento: fmtDate(nasc),
        idade: calcAge(nasc, exame || null),
        sexo: $('p_sexo').value,
        data_exame: fmtExam(exame),
        peso: $('p_peso').value ? esc($('p_peso').value) + ' kg' : '-',
        altura: $('p_altura').value ? esc($('p_altura').value) + ' cm' : '-',
        medico_solicitante: dash($('p_medico').value)
      },
      laudo: {
        paragrafos: $('l_paragrafos').value.split('\n').map(s => s.trim()).filter(Boolean),
        conclusao: $('l_conclusao').value.trim()
      },
      assinatura: {
        medico: $('a_medico').value.trim(),
        especialidade: $('a_especialidade').value.trim(),
        crm: $('a_crm').value.trim(),
        rqe: $('a_rqe').value.trim()
      }
    };
  }

  /* ---------- Montagem das páginas ---------- */

  function el(html) {
    const t = document.createElement('div');
    t.innerHTML = html.trim();
    return t.firstElementChild;
  }

  function pageHeaderHtml(d) {
    const logo = logoDataUrl
      ? `<img src="${logoDataUrl}" alt="Logo">`
      : `<div class="logo-placeholder">LOGO</div>`;
    return `<div class="page-header">
      <div class="logo-box">${logo}</div>
      <div class="clinic">
        <div class="name">${esc(d.clinica.nome) || '&nbsp;'}</div>
        ${d.clinica.unidade ? `<div class="unit">${esc(d.clinica.unidade)}</div>` : ''}
        <div class="exam">${esc(d.clinica.tipo_exame)}</div>
      </div>
    </div>`;
  }

  function pageFooterHtml(d) {
    const left = [d.clinica.tipo_exame, d.paciente.nome].filter(Boolean).map(esc).join(' — ');
    return `<div class="page-footer"><span>${left}</span><span class="page-num"></span></div>`;
  }

  function newPage(d, pagesEl) {
    const page = el(`<div class="page">${pageHeaderHtml(d)}<div class="page-content"></div>${pageFooterHtml(d)}</div>`);
    pagesEl.appendChild(page);
    return {
      el: page,
      content: page.querySelector('.page-content'),
      num: page.querySelector('.page-num')
    };
  }

  function buildBlocks(d) {
    const p = d.paciente;
    const blocks = [];

    blocks.push(el(`<table class="pgrid"><colgroup>${'<col>'.repeat(12)}</colgroup><tbody>
      <tr>
        <td colspan="6"><span class="lbl">Paciente:</span> ${esc(p.nome)}</td>
        <td colspan="3"><span class="lbl">Nascimento:</span> ${esc(p.nascimento)}${p.idade ? ` (${esc(p.idade)})` : ''}</td>
        <td colspan="3"><span class="lbl">Sexo:</span> ${esc(p.sexo)}</td>
      </tr>
      <tr>
        <td colspan="3"><span class="lbl">Peso:</span> ${p.peso}</td>
        <td colspan="3"><span class="lbl">Altura:</span> ${p.altura}</td>
        <td colspan="6"><span class="lbl">Data do exame:</span> ${esc(p.data_exame)}</td>
      </tr>
      <tr>
        <td colspan="12"><span class="lbl">Médico solicitante:</span> ${p.medico_solicitante}</td>
      </tr>
    </tbody></table>`));

    const ps = d.laudo.paragrafos;
    const firstP = ps.length ? `<p class="laudo-p">${esc(ps[0])}</p>` : '';
    blocks.push(el(`<div><div class="laudo-title">Laudo:</div>${firstP}</div>`));
    for (let i = 1; i < ps.length; i++) {
      blocks.push(el(`<p class="laudo-p">${esc(ps[i])}</p>`));
    }
    if (d.laudo.conclusao) {
      blocks.push(el(`<p class="laudo-p conclusao"><span class="lbl">CONCLUSÃO:</span> ${esc(d.laudo.conclusao)}</p>`));
    }

    const a = d.assinatura;
    const crmRqe = [a.crm, a.rqe].filter(Boolean).map(esc).join(' &bull; ');
    blocks.push(el(`<div class="sig-block">
      <div class="sig-line"></div>
      <div class="doc-name">${esc(a.medico)}</div>
      ${a.especialidade ? `<div>${esc(a.especialidade)}</div>` : ''}
      ${crmRqe ? `<div>${crmRqe}</div>` : ''}
    </div>`));

    return blocks;
  }

  function renderPreview() {
    const d = collectData();
    const pagesEl = $('pages');
    pagesEl.innerHTML = '';

    const pages = [];
    let page = newPage(d, pagesEl);
    pages.push(page);

    for (const block of buildBlocks(d)) {
      page.content.appendChild(block);
      if (page.content.scrollHeight > page.content.clientHeight && page.content.children.length > 1) {
        page.content.removeChild(block);
        page = newPage(d, pagesEl);
        pages.push(page);
        page.content.appendChild(block);
      }
    }

    const totalPages = pages.length + (examPdf ? examPdf.pageCount : 0);
    pages.forEach((pg, i) => { pg.num.textContent = `Página ${i + 1} de ${totalPages}`; });

    if (examPdf) {
      pagesEl.appendChild(el(`<div class="attach-note">&#128206; <b>${esc(examPdf.fileName)}</b> —
        ${examPdf.pageCount} página(s) do exame serão anexadas após a capa no PDF exportado.</div>`));
    }
    fitScale();
  }

  function fitScale() {
    const pane = $('preview-pane');
    const pages = $('pages');
    const wrap = $('pages-wrapper');
    pages.style.transform = 'none';
    const w = pages.offsetWidth;
    const h = pages.offsetHeight;
    const scale = Math.min(1, (pane.clientWidth - 48) / w);
    pages.style.transformOrigin = 'top left';
    pages.style.transform = `scale(${scale})`;
    wrap.style.width = (w * scale) + 'px';
    wrap.style.height = (h * scale) + 'px';
  }

  /* ---------- Exportação ---------- */

  const REQUIRED = [
    ['p_nome', 'Nome completo'],
    ['p_nascimento', 'Data de nascimento'],
    ['p_sexo', 'Sexo'],
    ['p_data_exame', 'Data e hora do exame']
  ];

  function validateRequired() {
    const missing = [];
    for (const [id, labelText] of REQUIRED) {
      const field = $(id);
      const empty = !field.value.trim();
      field.classList.toggle('invalid', empty);
      if (empty) missing.push(labelText);
    }
    return missing;
  }

  function buildFileName() {
    const nome = $('p_nome').value;
    const slug = nome
      .normalize('NFD').replace(/[̀-ͯ]/g, '')
      .toLowerCase().replace(/[^a-z0-9]+/g, '_')
      .replace(/^_+|_+$/g, '') || 'paciente';
    const exame = $('p_data_exame').value;
    const date = exame ? exame.slice(0, 10) : new Date().toISOString().slice(0, 10);
    return `laudo_${slug}_${date}.pdf`;
  }

  async function exportPdf() {
    const missing = validateRequired();
    if (missing.length) {
      alert('Preencha os campos obrigatórios:\n— ' + missing.join('\n— '));
      return;
    }
    if (!window.html2canvas || !window.PDFLib) {
      alert('Bibliotecas de PDF não carregadas (verifique a conexão e recarregue a página).\nAlternativa: Ctrl+P → Salvar como PDF (sem o anexo do exame).');
      return;
    }

    renderPreview();
    const pagesEl = $('pages');
    pagesEl.style.transform = 'none';
    const btn = $('btn-pdf');
    btn.disabled = true;
    btn.textContent = 'Gerando…';

    const A4_W = 595.28, A4_H = 841.89;
    try {
      const pdfDoc = await PDFLib.PDFDocument.create();
      for (const pageEl of pagesEl.querySelectorAll('.page')) {
        const canvas = await html2canvas(pageEl, { scale: 2, backgroundColor: '#ffffff', logging: false });
        const jpg = await pdfDoc.embedJpg(canvas.toDataURL('image/jpeg', 0.95));
        pdfDoc.addPage([A4_W, A4_H]).drawImage(jpg, { x: 0, y: 0, width: A4_W, height: A4_H });
      }
      if (examPdf) {
        const src = await PDFLib.PDFDocument.load(examPdf.bytes, { ignoreEncryption: true });
        const copied = await pdfDoc.copyPages(src, src.getPageIndices());
        copied.forEach(p => pdfDoc.addPage(p));
      }
      const bytes = await pdfDoc.save();
      const url = URL.createObjectURL(new Blob([bytes], { type: 'application/pdf' }));
      const a = document.createElement('a');
      a.href = url;
      a.download = buildFileName();
      a.click();
      URL.revokeObjectURL(url);
    } catch (err) {
      alert('Falha ao gerar o PDF: ' + err.message);
    } finally {
      fitScale();
      btn.disabled = false;
      btn.textContent = 'Exportar PDF';
    }
  }

  /* ---------- Exemplo (dados ilustrativos da especificação) ---------- */

  function preencherExemplo() {
    $('c_nome').value = 'Clínica Cardiológica Exemplo';
    $('c_unidade').value = 'Unidade Centro';
    $('c_tipo').value = 'Holter';
    $('p_nome').value = 'Paciente Exemplo da Silva';
    $('p_nascimento').value = '1980-03-12';
    $('p_sexo').value = 'Feminino';
    $('p_data_exame').value = '2026-06-10T09:30';
    ['p_peso', 'p_altura', 'p_medico'].forEach(id => { $(id).value = ''; });
    $('l_paragrafos').value = [
      'Ao Holter, observou-se ritmo sinusal durante todo o exame, com FC média de 72 bpm.',
      'Ausência de pausas significativas.',
      'Condução atrioventricular 1:1, com intervalo PR normal.',
      'Condução intraventricular normal.',
      'Ausência de ectopias supraventriculares e ventriculares.',
      'Ausência de alterações de repolarização ventricular significativas.'
    ].join('\n');
    $('l_conclusao').value = 'Ritmo sinusal // Ausência de alterações significativas.';
    $('a_medico').value = 'Dr(a). Nome do Médico';
    $('a_especialidade').value = 'Cardiologista';
    $('a_crm').value = 'CRM/UF 00000';
    $('a_rqe').value = 'RQE 00000';
    document.querySelectorAll('.invalid').forEach(f => f.classList.remove('invalid'));
    renderPreview();
  }

  /* ---------- Eventos ---------- */

  let debounceTimer;
  $('report-form').addEventListener('input', (e) => {
    e.target.classList.remove('invalid');
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(renderPreview, 250);
  });

  $('logo_file').addEventListener('change', () => {
    const file = $('logo_file').files[0];
    if (!file) { logoDataUrl = null; renderPreview(); return; }
    const reader = new FileReader();
    reader.onload = () => { logoDataUrl = reader.result; renderPreview(); };
    reader.readAsDataURL(file);
  });

  $('exam_pdf').addEventListener('change', async () => {
    const file = $('exam_pdf').files[0];
    if (!file) { examPdf = null; renderPreview(); return; }
    try {
      const bytes = await file.arrayBuffer();
      const doc = await PDFLib.PDFDocument.load(bytes, { ignoreEncryption: true });
      examPdf = { bytes, pageCount: doc.getPageCount(), fileName: file.name };
    } catch {
      examPdf = null;
      $('exam_pdf').value = '';
      alert('Não foi possível ler o PDF anexado. Verifique se o arquivo não está corrompido ou protegido por senha.');
    }
    renderPreview();
  });

  $('btn-exemplo').addEventListener('click', preencherExemplo);
  $('btn-preview').addEventListener('click', renderPreview);
  $('btn-pdf').addEventListener('click', exportPdf);
  window.addEventListener('resize', fitScale);

  const originalTitle = document.title;
  window.addEventListener('beforeprint', () => { document.title = buildFileName().replace(/\.pdf$/, ''); });
  window.addEventListener('afterprint', () => { document.title = originalTitle; });

  renderPreview();
</script>
</body>
</html>
